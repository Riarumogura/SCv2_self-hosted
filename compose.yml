name: stoat

services:
  # MongoDB: Database
  database:
    image: docker.io/mongo
    restart: always
    volumes:
      - ./data/db:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  # Redis: Event message broker & KV store
  redis:
    image: docker.io/eqalpha/keydb
    restart: always

  # RabbitMQ: Internal message broker
  rabbit:
    image: docker.io/rabbitmq:4
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: rabbituser
      RABBITMQ_DEFAULT_PASS: rabbitpass
    volumes:
      - ./data/rabbit:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s

  # MinIO: S3-compatible storage server
  minio:
    image: docker.io/minio/minio
    command: server /data
    volumes:
      - ./data/minio:/data
    environment:
      MINIO_ROOT_USER: minioautumn
      MINIO_ROOT_PASSWORD: minioautumn
      MINIO_DOMAIN: minio
    networks:
      default:
        aliases:
          - revolt-uploads.minio
          # legacy support:
          - attachments.minio
          - avatars.minio
          - backgrounds.minio
          - icons.minio
          - banners.minio
          - emojis.minio
    restart: always

  # Caddy: Web server
  caddy:
    image: docker.io/caddy
    restart: always
    env_file: .env.web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy-data:/data
      - ./data/caddy-config:/config
    networks:
      default:
        aliases:
         - "${STOAT_DOMAIN:-caddy}"

  # API server
  api:
    image: ghcr.io/stoatchat/api:v0.13.6
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
      rabbit:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # Events service
  events:
    image: ghcr.io/stoatchat/events:v0.13.6
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # File server
  autumn:
    image: ghcr.io/stoatchat/file-server:v0.13.6
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      createbuckets:
        condition: service_started
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # Metadata and image proxy
  january:
    image: ghcr.io/stoatchat/proxy:v0.13.6
    env_file: secrets.env
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # Tenor proxy
  gifbox:
    image: ghcr.io/stoatchat/gifbox:v0.13.6
    env_file: secrets.env
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # Regular task daemon
  crond:
    image: ghcr.io/stoatchat/crond:v0.13.6
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # Push notification daemon
  pushd:
    image: ghcr.io/stoatchat/pushd:v0.13.6
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
      rabbit:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

   # Voice ingress daemon
  voice-ingress:
    image: ghcr.io/stoatchat/voice-ingress:v0.13.6
    env_file: secrets.env
    restart: always
    depends_on:
      database:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml

  livekit:
    image: ghcr.io/stoatchat/livekit-server:v1.9.13
    depends_on:
      redis:
        condition: service_started
    command: --config /etc/livekit.yml
    ports:
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    restart: always
    volumes:
      - type: bind
        source: ./livekit.yml
        target: /etc/livekit.yml

  # Create buckets for minio.
  createbuckets:
    image: docker.io/minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      while ! /usr/bin/mc ready minio; do
        /usr/bin/mc alias set minio http://minio:9000 minioautumn minioautumn;
        echo 'Waiting minio...' && sleep 1;
      done;
      /usr/bin/mc mb minio/revolt-uploads;
      /usr/bin/mc mb minio/revolt-storage;
      exit 0;
      "

  # Storage API
  storage-api:
    build: ./services/storage-api
    restart: always
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioautumn
      MINIO_SECRET_KEY: minioautumn
      MINIO_BUCKET: revolt-storage
      MINIO_USE_SSL: "false"
      MONGODB_URI: mongodb://database:27017
      MONGODB_DB_NAME: sawarachats
      API_PORT: 3000
      API_HOST: 0.0.0.0
      STOAT_API_URL: http://api:14702
      CORS_ORIGIN: http://local.sawarachats.chat,http://localhost:5173
      DEFAULT_SERVER_STORAGE_LIMIT: "274877906944"
    ports:
      - "3001:3000"

  # Calendar API
  calendar-api:
    build: ./services/calendar-api
    restart: always
    depends_on:
      database:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://database:27017
      MONGODB_DB_NAME: sawarachats
      API_PORT: 3000
      API_HOST: 0.0.0.0
      STOAT_API_URL: http://api:14702
      CORS_ORIGIN: http://local.sawarachats.chat,http://localhost:5173
    ports:
      - "3002:3000"

  # Minecraft Server Manager
  mc-manager:
    build: ./services/mc-manager
    restart: always
    depends_on:
      database:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://database:27017
      MONGODB_DB_NAME: sawarachats
      API_PORT: 3000
      API_HOST: 0.0.0.0
      STOAT_API_URL: http://api:14702
      CORS_ORIGIN: http://local.sawarachats.chat,http://localhost:5173,http://211.128.55.46:8080
      MC_DATA_ROOT: /data/minecraft
      # CUSTOM: mc-managerはDocker-outside-of-Docker構成のため、dockerode経由で
      # 動的に作るコンテナのBindsには「ホストの実パス」を渡す必要がある
      # (mc-managerコンテナ内部のパス/data/minecraftをDockerデーモンは解釈できない)。
      # compose.ymlの設置場所が変わる場合はこの絶対パスも合わせて更新すること。
      MC_DATA_ROOT_HOST: /Users/wakisakahayato/GitHub/SawaraChats_v2/SCv2_self-hosted/data/minecraft
      DOCKER_NETWORK: stoat_default
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/minecraft:/data/minecraft
    ports:
      - "3003:3000"

  # Web App
  web:
    # sawarachats-web (custom build from SCv2_for-web)
    image: sawarachats-web
    restart: always
    env_file: .env.web
